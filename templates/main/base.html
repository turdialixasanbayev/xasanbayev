{% load static %}

<!DOCTYPE html>
<html lang="uz" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Turdiali Xasanbayev - Python Django developer. Web ilovalar, API va scalable tizimlar.">
    <meta name="keywords" content="python, django, drf, backend, web developer, xasanbayev">
    <meta name="author" content="Turdiali Xasanbayev">
    <meta property="og:title" content="Xasanbayev Portfolio">
    <meta property="og:description" content="Python Django developer portfolio">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://xasanbayev.uz">
    <meta name="robots" content="index, follow">
    <title>{% block title %}xasanbayev.uz{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Fonts: JetBrains Mono + Syne -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="icon" href="{% static 'main/img/favicon.ico' %}" type="image/x-icon">
    <link rel="canonical" href="https://xasanbayev.uz">

    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #161616;
            --accent: #00ff88;
            --accent-dim: rgba(0, 255, 136, 0.12);
            --text-primary: #f0f0f0;
            --text-muted: #666666;
            --border: rgba(255, 255, 255, 0.07);
            --font-display: 'Syne', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.92rem;
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── NAVBAR ── */
        .navbar {
            background-color: rgba(10, 10, 10, 0.85) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1030;
            transition: background 0.3s ease;
        }

        .navbar-brand {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--text-primary) !important;
            letter-spacing: -0.03em;
            text-decoration: none;
        }

        .navbar-brand span {
            color: var(--accent);
        }

        .navbar-nav .nav-link {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            font-weight: 400;
            color: var(--text-muted) !important;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.4rem 0.75rem !important;
            border-radius: 4px;
            transition: color 0.2s ease, background 0.2s ease;
            position: relative;
        }

        .navbar-nav .nav-link:hover {
            color: var(--text-primary) !important;
            background: var(--accent-dim);
        }

        .navbar-nav .nav-link.active {
            color: var(--accent) !important;
            background: var(--accent-dim);
        }

        /* Hamburger icon color */
        .navbar-toggler {
            border-color: var(--border);
        }

        .navbar-toggler-icon {
            filter: invert(1);
        }

        /* ── MAIN ── */
        main {
            flex: 1;
        }

        /* ── FOOTER ── */
        .footer {
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 1.5rem 0;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        .footer span {
            color: var(--accent);
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

    <!-- HEADER / NAVBAR -->
    {% include "main/header.html" %}

    <!-- MAIN CONTENT -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- FOOTER -->
    {% include "main/footer.html" %}

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}{% endblock %}

</body>

</html>
